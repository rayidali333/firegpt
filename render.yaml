services:
  - type: web
    name: drawingiq
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: 22.14.0
      - fromGroup: firegpt-secrets
